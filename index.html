<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogos Zerados</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="container">
      <h1>Meus Jogos Zerados</h1>
      <p>Registre e acompanhe os jogos que você já zerou.</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Adicionar jogo</h2>
      <form id="game-form">
        <label for="title">Título</label>
        <input id="title" name="title" type="text" placeholder="Nome do jogo" required />

        <label for="platform">Plataforma</label>
        <input id="platform" name="platform" type="text" placeholder="PC, PlayStation, Xbox..." required />

        <label for="year">Ano</label>
        <input id="year" name="year" type="number" min="1970" max="2100" placeholder="2026" />

        <label for="rating">Nota geral</label>
        <input id="rating" name="rating" type="number" min="0" max="10" step="0.1" placeholder="8.5" />

        <label for="soundtrack">Trilha sonora</label>
        <input id="soundtrack" name="soundtrack" type="number" min="0" max="10" step="0.1" placeholder="8.0" />

        <label for="gameplay">Jogabilidade</label>
        <input id="gameplay" name="gameplay" type="number" min="0" max="10" step="0.1" placeholder="9.0" />

        <label for="story">Enredo</label>
        <input id="story" name="story" type="number" min="0" max="10" step="0.1" placeholder="7.5" />

        <label for="notes">Observações</label>
        <textarea id="notes" name="notes" rows="3" placeholder="Comentário opcional"></textarea>

        <button type="submit">Salvar jogo</button>
      </form>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Lista de jogos</h2>
        <button id="clear-storage" class="secondary">Limpar tudo</button>
      </div>
      <div id="games-list" class="games-list">
        <p class="empty-state">Nenhum jogo registrado ainda. Adicione um jogo acima.</p>
      </div>
    </section>
  </main>

  <footer class="container">
    <p>Aplicação feita para acompanhar seus jogos zerados.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
